name: kraken-test

# Throwaway connectivity test: can a GitHub Actions US runner reach Kraken public API?
# No secrets, no DB, does not touch snapshot.js. Safe to delete after C5 connectivity is confirmed.
on:
  workflow_dispatch:

jobs:
  ktest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Write probe script
        run: |
          cat > probe.mjs <<'EOF'
          const tests = [
            ['XBTUSD,ETHUSD,SOLUSD (USD pairs)', 'https://api.kraken.com/0/public/Ticker?pair=XBTUSD,ETHUSD,SOLUSD'],
            ['XBTUSDT,USDTUSD (USDT + peg)', 'https://api.kraken.com/0/public/Ticker?pair=XBTUSDT,USDTUSD'],
          ];
          for (const [label, url] of tests) {
            const t0 = Date.now();
            try {
              const r = await fetch(url);
              const ms = Date.now() - t0;
              const text = await r.text();
              let j = null; try { j = JSON.parse(text); } catch (e) {}
              console.log('=== ' + label + ' ===');
              console.log('status=' + r.status + ' ms=' + ms + ' ok=' + r.ok);
              if (j) {
                console.log('error=' + JSON.stringify(j.error));
                const res = j.result || {};
                for (const k of Object.keys(res)) {
                  const c = res[k] && res[k].c ? res[k].c[0] : null;
                  console.log('  ' + k + ' last=' + c);
                }
              } else {
                console.log('non-JSON body head: ' + text.slice(0, 200));
              }
            } catch (e) {
              console.log('=== ' + label + ' ===');
              console.log('FETCH ERROR: ' + (e && e.message ? e.message : e));
            }
          }
          EOF

      - name: Probe Kraken
        run: node probe.mjs
